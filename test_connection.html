<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        pre {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            border-left: 4px solid #667eea;
        }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        img {
            max-width: 300px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🔧 Image Captioning API - Connection Test</h1>
    
    <div class="test-box">
        <h2>Step 1: Check API Server</h2>
        <button onclick="checkHealth()">Test Connection</button>
        <div id="healthStatus"></div>
    </div>

    <div class="test-box">
        <h2>Step 2: Test Image Upload</h2>
        <input type="file" id="testImage" accept="image/*" onchange="previewImage()">
        <div id="imagePreview"></div>
        <button onclick="testUpload()" id="uploadBtn" disabled>Upload & Caption</button>
        <div id="uploadStatus"></div>
    </div>

    <div class="test-box">
        <h2>Troubleshooting Info</h2>
        <pre id="troubleshoot">
Click "Test Connection" above to start...
        </pre>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let selectedFile = null;

        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            const troubleshoot = document.getElementById('troubleshoot');
            
            statusDiv.innerHTML = '<p class="warning">⏳ Testing connection...</p>';
            troubleshoot.textContent = 'Testing connection to ' + API_URL + '...\n';
            
            try {
                const response = await fetch(API_URL + '/health', {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    throw new Error('Server returned: ' + response.status);
                }
                
                const data = await response.json();
                
                statusDiv.innerHTML = `
                    <div class="status online">
                        ✅ API Server is Online!
                    </div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                troubleshoot.textContent = 
                    '✅ SUCCESS! API is reachable\n\n' +
                    'Status: ' + data.status + '\n' +
                    'Model Loaded: ' + data.model_loaded + '\n' +
                    'Device: ' + data.device + '\n' +
                    'CUDA Available: ' + data.cuda_available + '\n\n' +
                    'Next: Upload an image to test captioning!';
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status offline">
                        ❌ Cannot Connect to API Server
                    </div>
                    <p class="error">Error: ${error.message}</p>
                `;
                
                troubleshoot.textContent = 
                    '❌ CONNECTION FAILED\n\n' +
                    'Error: ' + error.message + '\n\n' +
                    '🔧 TROUBLESHOOTING:\n\n' +
                    '1. Is api_server.py running?\n' +
                    '   Open terminal: python api_server.py\n\n' +
                    '2. Are you opening this file correctly?\n' +
                    '   ❌ Wrong: file:///C:/...\n' +
                    '   ✅ Right: http://localhost:3000/...\n\n' +
                    '   Run: python -m http.server 3000\n' +
                    '   Then: http://localhost:3000/test_connection.html\n\n' +
                    '3. Check Windows Firewall\n' +
                    '   Allow Python through firewall\n\n' +
                    '4. Try different port\n' +
                    '   Change 8000 to 8080 in api_server.py\n\n' +
                    '5. Test in browser directly:\n' +
                    '   http://localhost:8000/health\n' +
                    '   http://localhost:8000/docs';
            }
        }

        function previewImage() {
            const file = document.getElementById('testImage').files[0];
            const preview = document.getElementById('imagePreview');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `
                        <img src="${e.target.result}" alt="Preview">
                        <p>File: ${file.name} (${(file.size / 1024).toFixed(2)} KB)</p>
                    `;
                    uploadBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }

        async function testUpload() {
            if (!selectedFile) {
                alert('Please select an image first!');
                return;
            }

            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<p class="warning">⏳ Generating caption...</p>';

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('max_tokens', '60');
                formData.append('num_beams', '5');

                const response = await fetch(API_URL + '/caption', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Upload failed: ' + response.status);
                }

                const data = await response.json();

                if (data.success) {
                    statusDiv.innerHTML = `
                        <div class="status online">
                            ✅ Caption Generated Successfully!
                        </div>
                        <h3>Caption:</h3>
                        <pre>${data.caption}</pre>
                        <p><small>Device: ${data.device}</small></p>
                    `;
                } else {
                    throw new Error('Caption generation failed');
                }

            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status offline">
                        ❌ Upload Failed
                    </div>
                    <p class="error">Error: ${error.message}</p>
                `;
            }
        }

        // Auto-check on load
        window.onload = () => {
            setTimeout(checkHealth, 500);
        };
    </script>
</body>
</html>
